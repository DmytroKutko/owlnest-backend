services:
  postgres:
    image: 'postgres:18'
    environment:
      POSTGRES_DB: '${POSTGRES_DB:?Set POSTGRES_DB in .env}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}'
      POSTGRES_USER: '${POSTGRES_USER:?Set POSTGRES_USER in .env}'
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - 'postgres_data:/var/lib/postgresql'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  keycloak:
    image: 'quay.io/keycloak/keycloak:26.7.0'
    command: ['start-dev', '--import-realm', '--spi-theme--welcome-theme=owlnest']
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: '${KEYCLOAK_ADMIN_USERNAME:?Set KEYCLOAK_ADMIN_USERNAME in .env}'
      KC_BOOTSTRAP_ADMIN_PASSWORD: '${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD in .env}'
      KC_HEALTH_ENABLED: 'true'
      KC_HOSTNAME: 'http://localhost:${KEYCLOAK_PORT:-8081}'
    ports:
      - '127.0.0.1:${KEYCLOAK_PORT:-8081}:8080'
    volumes:
      - 'keycloak_data:/opt/keycloak/data'
      - './docker/keycloak/owlnest-realm.json:/opt/keycloak/data/import/owlnest-realm.json:ro'
      - './docker/keycloak/themes/owlnest:/opt/keycloak/themes/owlnest:ro'
    healthcheck:
      test: ['CMD-SHELL', 'bash -c "exec 3<>/dev/tcp/127.0.0.1/9000 && printf \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3"']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    mem_limit: 768m

  redis:
    image: 'redis:7-alpine'
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    mem_limit: 128m

  backend:
    profiles: ['full-stack']
    build:
      context: .
      dockerfile: Dockerfile
    image: 'owlnest-backend:local'
    environment:
      JAVA_TOOL_OPTIONS: '-Duser.timezone=UTC'
      AUTH_AUDIENCE: 'owlnest-api'
      AUTH_ISSUER_URI: 'http://localhost:${KEYCLOAK_PORT:-8081}/realms/owlnest'
      AUTH_JWK_SET_URI: 'http://keycloak:8080/realms/owlnest/protocol/openid-connect/certs'
      SPRING_DATASOURCE_URL: 'jdbc:postgresql://postgres:5432/${POSTGRES_DB}'
      SPRING_DATASOURCE_USERNAME: '${POSTGRES_USER}'
      SPRING_DATASOURCE_PASSWORD: '${POSTGRES_PASSWORD}'
      SPRING_DATA_REDIS_HOST: 'redis'
      SPRING_DATA_REDIS_PORT: '6379'
    ports:
      - '127.0.0.1:${SERVER_PORT:-8080}:8080'
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  keycloak_data:
  postgres_data:
